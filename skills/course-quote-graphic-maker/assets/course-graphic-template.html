<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}}</title>
  <style>
    :root {
      --ink: #07171b;
      --paper: #f6f1e7;
      --mist: #d7e1dd;
      --gold: #d9ad58;
      --mint: #a7d2c1;
      --photo-scale: {{PHOTO_SCALE}};
      --photo-x: {{PHOTO_X}};
      --photo-y: {{PHOTO_Y}};
      --photo-origin: {{PHOTO_ORIGIN}};
      --photo-brightness: {{PHOTO_BRIGHTNESS}};
      --photo-contrast: {{PHOTO_CONTRAST}};
      --photo-saturation: {{PHOTO_SATURATION}};
      --overlay-end: {{OVERLAY_END}};
      --content-width: {{CONTENT_WIDTH}};
      --headline-size: {{HEADLINE_SIZE}};
      --reflection-size: {{REFLECTION_SIZE}};
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 2048px;
      height: 1152px;
      overflow: hidden;
      background: var(--ink);
    }

    .canvas {
      position: relative;
      width: 2048px;
      height: 1152px;
      overflow: hidden;
      isolation: isolate;
      color: var(--paper);
    }

    .photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: var(--photo-x) var(--photo-y);
      filter: brightness(var(--photo-brightness)) contrast(var(--photo-contrast)) saturate(var(--photo-saturation)) sepia(.025);
      transform-origin: var(--photo-origin);
      transform: scale(var(--photo-scale));
      z-index: -4;
    }

    .left-falloff {
      position: absolute;
      inset: 0;
      z-index: -3;
      background:
        linear-gradient(90deg,
          rgba(4, 17, 21, .96) 0%,
          rgba(4, 17, 21, .92) 18%,
          rgba(4, 17, 21, .78) 29%,
          rgba(4, 17, 21, .42) calc(var(--overlay-end) - 16%),
          rgba(4, 17, 21, .09) calc(var(--overlay-end) - 7%),
          rgba(4, 17, 21, 0) var(--overlay-end)),
        linear-gradient(0deg,
          rgba(3, 12, 15, .56) 0%,
          rgba(3, 12, 15, .12) 23%,
          rgba(3, 12, 15, 0) 44%);
    }

    .soft-vignette {
      position: absolute;
      inset: 0;
      z-index: -2;
      box-shadow: inset 0 0 170px rgba(0,0,0,.23);
      border: 1px solid rgba(255,255,255,.11);
    }

    .grain {
      position: absolute;
      inset: 0;
      z-index: -1;
      opacity: .055;
      mix-blend-mode: soft-light;
      background-image:
        repeating-linear-gradient(0deg, rgba(255,255,255,.55) 0, rgba(255,255,255,.55) 1px, transparent 1px, transparent 3px),
        repeating-linear-gradient(90deg, rgba(0,0,0,.45) 0, rgba(0,0,0,.45) 1px, transparent 1px, transparent 4px);
    }

    .content {
      position: absolute;
      left: 112px;
      top: 78px;
      width: var(--content-width);
      height: 992px;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 22px;
      font-family: "PingFang TC", "Noto Sans TC", sans-serif;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: .12em;
      color: var(--mist);
      white-space: nowrap;
    }

    .meta .rule {
      width: 56px;
      height: 2px;
      background: var(--gold);
      box-shadow: 0 0 16px rgba(217,173,88,.30);
    }

    .meta .brand { color: var(--gold); }

    .headline {
      margin-top: 92px;
      font-family: "Songti TC", "Songti SC", "Noto Serif TC", serif;
      font-size: var(--headline-size);
      font-weight: 500;
      line-height: 1.34;
      letter-spacing: .045em;
      text-shadow: 0 4px 24px rgba(0,0,0,.34);
    }

    .headline .gold {
      color: var(--gold);
      position: relative;
      white-space: nowrap;
    }

    .headline .gold::after {
      content: "";
      position: absolute;
      left: .12em;
      right: .08em;
      bottom: -.17em;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), rgba(217,173,88,0));
    }

    .reflection {
      margin-top: 74px;
      padding-left: 30px;
      border-left: 3px solid rgba(217,173,88,.86);
      font-family: "Songti TC", "Songti SC", "Noto Serif TC", serif;
      font-size: var(--reflection-size);
      font-weight: 400;
      line-height: 1.72;
      letter-spacing: .055em;
      color: rgba(246,241,231,.94);
      text-shadow: 0 3px 18px rgba(0,0,0,.32);
    }

    .reflection .question { color: var(--mint); font-weight: 500; }

    .date-line {
      position: absolute;
      left: 0;
      bottom: 10px;
      width: calc(var(--content-width) - 5px);
      padding-top: 28px;
      border-top: 1px solid rgba(255,255,255,.22);
      font-family: "PingFang TC", "Noto Sans TC", sans-serif;
      font-size: 22px;
      font-weight: 500;
      line-height: 1.5;
      letter-spacing: .18em;
      color: rgba(215,225,221,.90);
      text-shadow: 0 3px 16px rgba(0,0,0,.35);
    }

    .quote-mark {
      position: absolute;
      left: -8px;
      top: 126px;
      font-family: Georgia, serif;
      font-size: 118px;
      line-height: 1;
      color: rgba(217,173,88,.15);
      transform: translateX(-55px);
    }
  </style>
</head>
<body>
  <main class="canvas">
    <img class="photo" src="{{PHOTO_URL}}" alt="{{ALT_TEXT}}" />
    <div class="left-falloff"></div>
    <div class="soft-vignette"></div>
    <div class="grain"></div>

    <section class="content">
      <div class="meta">
        <span class="rule"></span>
        <span class="brand">{{BRAND}}</span>
      </div>

      <div class="quote-mark">“</div>
      <div class="headline">{{HEADLINE_HTML}}</div>
      <div class="reflection">{{REFLECTION_HTML}}</div>
      <div class="date-line">{{DATE}}</div>
    </section>
  </main>
</body>
</html>
